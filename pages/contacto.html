<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Kesya</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="light-orb-pink"></div>
    <div class="light-orb-blue"></div>

    <header class="navbar">
        <nav>
            <ul class="nav-direita">
                <li><a href="../index.html">Início</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="skills.html">Skills</a></li>
                <li><a href="blog.html">Blog</a></li> 
                <li><a href="projetos.html">Projetos</a></li>
                <li><a href="contacto.html" class="active">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main class="container-central">
        <section class="intro" style="text-align: left; margin-bottom: 20px;">
            <h2 style="color: var(--neon-pink);">Portfólio</h2>
        </section>

        <section class="card" style="width: 95%; max-width: 1100px; display: flex; flex-wrap: wrap; gap: 30px; align-items: stretch;">
            
            <div style="flex: 1; min-width: 300px; padding: 20px; border-right: 1px solid rgba(255,255,255,0.1);">
                <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 20px;">
                    <img src="../assets/img/4.png" alt="Kesya" style="width: 180px; height: 180px; border-radius: 50%; border: 2px solid var(--neon-blue); object-fit: cover;">
                    <h1 style="color: var(--neon-blue); margin: 0;">Contactos</h1>
                </div>

                <p style="margin-bottom: 25px; opacity: 0.8;">Escolhe a via que preferires para network ou proposta de trabalho.</p>
                
                <div class="lista-contactos">
                    <p><i class="fas fa-envelope" style="color: var(--neon-pink);"></i> <strong>Email:</strong> kesya.c.moraes@gmail.com</p>
                    <p><i class="fas fa-phone" style="color: var(--neon-pink);"></i> <strong>Telefone:</strong> +351 934 018 170</p>
                <div style="margin: 30px 0; text-align: left;">
                    <a href="../assets/CV-Kesya-2026- .pdf" download="Curriculo_Kesya_Moraes.pdf" style="text-decoration: none;">
                        <button class="btn-download">
                            <i class="fas fa-file-pdf"></i> Baixar Meu CV (PDF)
                        </button>
                    </a>
                </div> 
                    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #333;">
                    
                    <div class="social-links" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <a href="https://www.linkedin.com/in/kesya-moraes/" target="_blank" class="btn-social" style="text-decoration: none;">
                            <button style="width: 100%; cursor: pointer;"><i class="fab fa-linkedin"></i> LinkedIn</button>
                        </a>
                        <a href="https://github.com/kesyacmoraes" target="_blank" class="btn-social" style="text-decoration: none;">
                            <button style="width: 100%; cursor: pointer;"><i class="fab fa-github"></i> GitHub</button>
                        </a>
                        <a href="https://www.instagram.com/kesyarmoraes/" target="_blank" class="btn-social" style="text-decoration: none;">
                            <button style="width: 100%; cursor: pointer;"><i class="fab fa-instagram"></i> Instagram</button>
                        </a>
                        <a href="https://roadmap.sh/u/kesyacmoraes" target="_blank" class="btn-social" style="text-decoration: none;">
                            <button style="width: 100%; cursor: pointer;"><i class="fas fa-map-signs"></i> Roadmap</button>
                        </a>
                    </div>
                </div>  
            </div>

            <div style="flex: 1.2; min-width: 300px; padding: 20px;">
                <form id="form-contacto">
                    <label for="nome" style="color: var(--neon-pink); display: block; margin-bottom: 5px;">Nome:</label>
                    <input type="text" id="nome" name="nome" placeholder="Teu nome aqui" required style="width: 100%; margin-bottom: 15px;">

                    <label for="email" style="color: var(--neon-pink); display: block; margin-bottom: 5px;">Email:</label>
                    <input type="email" id="email" name="email" placeholder="exemplo@email.com" required style="width: 100%; margin-bottom: 15px;">

                    <label for="assunto" style="color: var(--neon-pink); display: block; margin-bottom: 5px;">Assunto:</label>
                    <select id="assunto" name="assunto" style="width: 100%; margin-bottom: 15px; background: #1a1a1a; color: white; padding: 10px; border-radius: 5px; border: 1px solid #333;">
                        <option value="Proposta de Trabalho">💼 Proposta de Trabalho</option>
                        <option value="Network / Parceria">🤝 Network / Parceria</option>
                        <option value="Dúvida Técnica">❓ Dúvida Técnica</option>
                    </select>

                    <label for="mensagem" style="color: var(--neon-pink); display: block; margin-bottom: 5px;">Mensagem:</label>
                    <textarea id="mensagem" name="mensagem" rows="5" placeholder="Como posso ajudar?" style="width: 100%; padding: 10px; border-radius: 5px; background: #1a1a1a; color: white; border: 1px solid #333;"></textarea>

                    <button type="submit" style="width: 100%; margin-top: 20px; padding: 15px; cursor: pointer; background: linear-gradient(90deg, var(--neon-pink), var(--neon-blue)); color: white; border: none; font-weight: bold; border-radius: 5px;">
                        Enviar Mensagem
                    </button>
                </form>
            </div>
        </section>
    </main>

    <footer style="text-align: center; padding: 40px; opacity: 0.5;">
        <p>&copy; 2026 - Trabalho Final UC 00604</p>
    </footer>

</html>
